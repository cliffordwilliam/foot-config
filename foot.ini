# foot config — deliberately minimal. Full reference: man 5 foot.ini
# One terminal, one job. Window management is the compositor's problem, not foot's.

font=JetBrainsMono Nerd Font:size=11
line-height=17
# 8px padding. 'center-when-maximized-and-fullscreen' splits the sub-cell
# leftover (window size is never an exact multiple of the glyph cell) evenly
# on all sides instead of dumping it at the bottom-right.
pad=8x8 center-when-maximized-and-fullscreen

# Always fill the screen -- never a reason to start small here.
initial-window-mode=maximized

[scrollback]
# lines of history kept in memory
lines=10000

[cursor]
style=block
blink=no

[mouse]
hide-when-typing=yes

# Titlebar (client-side decoration). size=0 hides it entirely — no bar, no
# buttons. Manage the window via GNOME: Super+drag move, Super+arrows tile.
[csd]
size=0

# Gruvbox dark — easy on the eyes, matches a nerd-font vim setup.
[colors]
foreground=ebdbb2
background=282828

regular0=282828
regular1=cc241d
regular2=98971a
regular3=d79921
regular4=458588
regular5=b16286
regular6=689d6a
regular7=a89984

bright0=928374
bright1=fb4934
bright2=b8bb26
bright3=fabd2f
bright4=83a598
bright5=d3869b
bright6=8ec07c
bright7=ebdbb2
